name: Deploy Preview

on:
  push:
    branches-ignore:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.repository == 'CaliCastle/cali.so' &&
      github.event.repository.fork == false &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: preview
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Deploy Preview
        id: deployment
        uses: ./.github/actions/deploy-neon-vercel
        with:
          branch-name: preview/${{ github.ref_name }}
          parent-branch: staging
          target: preview
          git-ref: ${{ github.ref_name }}
          commit-sha: ${{ github.sha }}
          project-id: ${{ vars.NEON_PROJECT_ID }}
          api-key: ${{ secrets.NEON_API_KEY }}
          migration-role: ${{ vars.NEON_MIGRATION_ROLE }}
          runtime-role: ${{ vars.NEON_RUNTIME_ROLE }}
          database: ${{ vars.NEON_DATABASE }}
          vercel-org-id: ${{ vars.VERCEL_ORG_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}

      - name: Comment Preview URL on pull request
        env:
          COMMIT_SHA: ${{ github.sha }}
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.deployment-url }}
          GITHUB_TOKEN: ${{ github.token }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: node scripts/comment-preview-deployment.mjs

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify Preview in browser
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deployment.outputs.deployment-url }}
        run: pnpm test:browser:hosted
