name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce expand-only database migrations
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: node scripts/check-production-migrations.mjs "$BASE_SHA" "$HEAD_SHA"

      - name: Run database migrations
        env:
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          : "${MIGRATION_DATABASE_URL:?Production MIGRATION_DATABASE_URL is not configured}"
          pnpm db:migrate

      - name: Deploy Vercel Production
        env:
          DEPLOY_COMMIT_SHA: ${{ github.sha }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          : "${VERCEL_ORG_ID:?Production VERCEL_ORG_ID is not configured}"
          : "${VERCEL_PROJECT_ID:?Production VERCEL_PROJECT_ID is not configured}"
          : "${VERCEL_TOKEN:?Production VERCEL_TOKEN is not configured}"
          deployment_url="$(
            pnpm dlx vercel@56.3.1 deploy --prod \
              --yes \
              --token "$VERCEL_TOKEN" \
              --build-env ENABLE_EXPERIMENTAL_COREPACK=1 \
              --meta githubCommitRef="main" \
              --meta githubCommitSha="$DEPLOY_COMMIT_SHA"
          )"
          if [[ ! "$deployment_url" =~ ^https://[A-Za-z0-9.-]+\.vercel\.app$ ]]; then
            echo "Vercel did not return a Production deployment URL." >&2
            exit 1
          fi
          printf '### Production deployment\n[%s](%s)\n' \
            "$deployment_url" "$deployment_url" >> "$GITHUB_STEP_SUMMARY"
