name: Media Storage Live Contract

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Confirm these are disposable non-production Bunny zones
        required: true
        type: choice
        options:
          - confirmed-non-production

permissions:
  contents: read

concurrency:
  group: media-storage-live-contract
  cancel-in-progress: false

jobs:
  contract:
    name: Bunny non-production contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: bunny-media-contract
    env:
      BUNNY_STORAGE_LIVE_TEST: ${{ inputs.confirmation }}
      BUNNY_STORAGE_CONTRACT_ENVIRONMENT: non-production
      BUNNY_STORAGE_CONTRACT_ORIGIN: https://cali.so
      BUNNY_STORAGE_CONTRACT_EDGE_TTL_SECONDS: ${{ vars.BUNNY_STORAGE_CONTRACT_EDGE_TTL_SECONDS }}
      BUNNY_STORAGE_CONTRACT_BROWSER_TTL_SECONDS: ${{ vars.BUNNY_STORAGE_CONTRACT_BROWSER_TTL_SECONDS }}
      BUNNY_MEDIA_REGION: ${{ vars.BUNNY_MEDIA_REGION }}
      BUNNY_MEDIA_ZONE: ${{ secrets.BUNNY_MEDIA_ZONE }}
      BUNNY_MEDIA_PASSWORD: ${{ secrets.BUNNY_MEDIA_PASSWORD }}
      BUNNY_MEDIA_CDN_URL: ${{ vars.BUNNY_MEDIA_CDN_URL }}
      BUNNY_CDN_API_KEY: ${{ secrets.BUNNY_CDN_API_KEY }}
    steps:
      - name: Confirm non-production storage
        run: |
          if [[ "$BUNNY_STORAGE_LIVE_TEST" != "confirmed-non-production" ]]; then
            echo "Non-production Bunny storage confirmation is required."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Bunny storage contract
        run: pnpm test:media:storage:live
