name: Media Storage Live Contract

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Confirm these are disposable non-production Bunny zones
        required: true
        type: choice
        options:
          - confirmed-non-production

permissions:
  contents: read

concurrency:
  group: media-storage-live-contract
  cancel-in-progress: false

jobs:
  contract:
    name: Bunny non-production contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: bunny-media-contract
    env:
      BUNNY_STORAGE_LIVE_TEST: ${{ inputs.confirmation }}
      BUNNY_STORAGE_CONTRACT_ENVIRONMENT: non-production
      BUNNY_STORAGE_CONTRACT_ORIGIN: https://cali.so
      BUNNY_STORAGE_CONTRACT_EDGE_TTL_SECONDS: ${{ vars.BUNNY_STORAGE_CONTRACT_EDGE_TTL_SECONDS }}
      BUNNY_STORAGE_CONTRACT_BROWSER_TTL_SECONDS: ${{ vars.BUNNY_STORAGE_CONTRACT_BROWSER_TTL_SECONDS }}
      BUNNY_MEDIA_REGION: ${{ vars.BUNNY_MEDIA_REGION }}
      BUNNY_ORIGINALS_ZONE: ${{ secrets.BUNNY_ORIGINALS_ZONE }}
      BUNNY_ORIGINALS_PASSWORD: ${{ secrets.BUNNY_ORIGINALS_PASSWORD }}
      BUNNY_RENDITIONS_ZONE: ${{ secrets.BUNNY_RENDITIONS_ZONE }}
      BUNNY_RENDITIONS_PASSWORD: ${{ secrets.BUNNY_RENDITIONS_PASSWORD }}
      BUNNY_RENDITIONS_CDN_URL: ${{ vars.BUNNY_RENDITIONS_CDN_URL }}
      BUNNY_CDN_API_KEY: ${{ secrets.BUNNY_CDN_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify Bunny storage and browser contracts
        run: pnpm test:media:storage:live
